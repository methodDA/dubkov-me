{{- define "main" }}

{{- if .IsHome }}
<article class="post-single">
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{- else }}

{{- if .Title }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
</header>
{{- end }}

{{- if .Content }}
<div class="post-content">
  {{ .Content }}
</div>
{{- end }}

{{- end }}

{{- end }}{{- /* end main */ -}}
