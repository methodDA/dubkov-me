<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — dubkov.me</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/terminal.css">
  {{ with site.Params.favicon }}<link rel="icon" href="{{ . }}">{{ end }}
  <!-- OG -->
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{{ .Lang }}">
  {{ range .Translations }}
  <link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}">
  {{ end }}
</head>
<body>
  {{ if eq .Lang "ru" }}
  <script>
  (function() {
    if (!sessionStorage.getItem("lang_checked")) {
      sessionStorage.setItem("lang_checked", "1");
      var lang = (navigator.language || navigator.userLanguage || "").toLowerCase();
      if (!lang.startsWith("ru")) {
        window.location.replace("/en/");
      }
    }
  })();
  </script>
  {{ end }}
  <div class="terminal">
    {{- partial "header.html" . -}}
    <main>
      {{- block "main" . }}{{- end }}
    </main>
    {{- partial "footer.html" . -}}
  </div>
</body>
</html>
