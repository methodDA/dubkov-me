<header class="top-bar">
  <span class="site-name">alexey@dubkov.me</span>
  <nav class="lang-switch">
    {{ if eq .Lang "ru" }}
      <a href="{{ .Permalink }}" class="active">RU</a>
      {{ range .Translations }}<a href="{{ .Permalink }}">EN</a>{{ end }}
    {{ else }}
      {{ range .Translations }}<a href="{{ .Permalink }}">RU</a>{{ end }}
      <a href="{{ .Permalink }}" class="active">EN</a>
    {{ end }}
  </nav>
</header>
